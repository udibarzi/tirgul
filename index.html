<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תרגול מתמטיקה</title>
  <link rel="stylesheet" href="app/style.css">
  <style>
    /* Landing-specific overrides */
    .welcome-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.5s ease;
    }
    .returning-greeting {
      font-size: 1.2em;
      margin-bottom: var(--space-md);
      text-align: center;
    }
    .change-name {
      font-size: 0.8em;
      color: var(--color-text-light);
      cursor: pointer;
      text-decoration: underline;
      margin-top: var(--space-sm);
      text-align: center;
      display: block;
    }
    .total-stats {
      text-align: center;
      padding: var(--space-md);
      background: rgba(78, 205, 196, 0.08);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-lg);
    }
    .total-stats .big-number {
      font-size: 2em;
      font-weight: 700;
      color: var(--color-primary);
    }
  </style>
</head>
<body>
  
  <!-- Screen 1: Name Entry (first visit) -->
  <div id="nameScreen" class="landing-container">
    <div class="welcome-card">
      <div class="landing-logo text-center">🧮</div>
      <h1 class="landing-title text-center">תרגול מתמטיקה</h1>
      <p class="landing-subtitle text-center">מוכנים להתחיל לתרגל?</p>
      <div class="name-input-group">
        <input type="text" id="nameInput" class="name-input" 
               placeholder="מה השם שלך?" 
               autocomplete="off" autofocus>
      </div>
      <div class="text-center">
        <button id="startBtn" class="start-btn" disabled>!בואו נתחיל</button>
      </div>
    </div>
  </div>
  
  <!-- Screen 2: Topic Selection -->
  <div id="topicsScreen" class="topics-container hidden">
    <div class="topics-header">
      <h1>שלום <span class="user-name" id="displayName"></span> 👋</h1>
      <a class="change-name" id="changeNameLink">שינוי שם</a>
    </div>
    
    <div class="total-stats" id="totalStats">
      <div>תשובות נכונות</div>
      <div class="big-number" id="totalCorrect">0</div>
    </div>
    
    <div class="topics-grid" id="topicsGrid">
      <!-- Populated dynamically from manifest -->
    </div>
  </div>
  
  <script src="app/core.js"></script>
  <script>
    const progress = new ProgressManager('math_app');
    let manifest = null;
    
    // ---- Initialization ----
    async function init() {
      manifest = await loadManifest('content/manifest.json');
      
      if (!manifest) {
        document.body.innerHTML = '<div style="text-align:center;padding:40px;">שגיאה בטעינת התוכן. נסו לרענן את הדף.</div>';
        return;
      }
      
      const savedName = progress.getUserName();
      if (savedName) {
        showTopics(savedName);
      } else {
        showNameScreen();
      }
    }
    
    // ---- Name Screen ----
    function showNameScreen() {
      document.getElementById('nameScreen').classList.remove('hidden');
      document.getElementById('topicsScreen').classList.add('hidden');
      
      const input = document.getElementById('nameInput');
      const btn = document.getElementById('startBtn');
      
      input.addEventListener('input', () => {
        btn.disabled = !input.value.trim();
      });
      
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
          startWithName(input.value.trim());
        }
      });
      
      btn.addEventListener('click', () => {
        if (input.value.trim()) startWithName(input.value.trim());
      });
    }
    
    function startWithName(name) {
      progress.setUserName(name);
      showTopics(name);
    }
    
    // ---- Topics Screen ----
    function showTopics(name) {
      document.getElementById('nameScreen').classList.add('hidden');
      document.getElementById('topicsScreen').classList.remove('hidden');
      document.getElementById('displayName').textContent = name;
      
      document.getElementById('changeNameLink').onclick = () => {
        progress.setUserName('');
        document.getElementById('nameInput').value = '';
        document.getElementById('startBtn').disabled = true;
        showNameScreen();
      };
      
      renderTopicGrid();
      updateTotalStats();
    }
    
    function renderTopicGrid() {
      const grid = document.getElementById('topicsGrid');
      grid.innerHTML = '';
      
      manifest.topics.forEach(topic => {
        const p = progress.getTopicProgress(topic.id);
        const pct = p.total > 0 ? Math.round((p.correct / p.total) * 100) : 0;
        
        const card = document.createElement('a');
        card.className = 'topic-card';
        card.href = `app/quiz.html?topic=${topic.id}&name=${encodeURIComponent(progress.getUserName())}`;
        
        card.innerHTML = `
          <div class="icon">${topic.icon || '📝'}</div>
          <div class="name">${topic.name}</div>
          ${p.total > 0 ? `
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="stats">${p.correct}/${p.total} (${pct}%)</div>
          ` : `
            <div class="stats">טרם תורגל</div>
          `}
        `;
        
        grid.appendChild(card);
      });
    }
    
    function updateTotalStats() {
      const allProgress = progress.getAllProgress();
      let totalCorrect = 0;
      Object.values(allProgress).forEach(p => {
        totalCorrect += (p.correct || 0);
      });
      document.getElementById('totalCorrect').textContent = totalCorrect;
    }
    
    // ---- Boot ----
    init();
  </script>
</body>
</html>
