<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>אלופי הכפל — חצי גמר וגמר 🏅</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Speed drill specific styles */
    .speed-container {
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
    }
    .speed-header {
      background: linear-gradient(135deg, #8B5CF6, #6D28D9);
      color: white;
      padding: 16px 20px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .speed-header h1 { font-size: 1.3em; font-weight: 700; }
    .speed-back {
      position: absolute;
      right: 16px;
      top: 16px;
      background: rgba(255,255,255,0.25);
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .speed-back:hover { background: rgba(255,255,255,0.4); }
    .speed-setup h2 {
      margin-bottom: 16px;
      color: #6D28D9;
      font-size: 1.2em;
    }

    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }
    .cat-select-btn {
      padding: 12px 8px;
      border: 2px solid #e0e0e0;
      border-radius: var(--radius-md);
      background: white;
      font-family: 'Rubik', sans-serif;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .cat-select-btn.selected {
      border-color: #8B5CF6;
      background: #F3E8FF;
      color: #6D28D9;
    }
    .cat-select-btn:hover { border-color: #8B5CF6; }

    .speed-option-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 12px 0;
      flex-wrap: wrap;
    }
    .speed-option-btn {
      padding: 10px 20px;
      border: 2px solid #e0e0e0;
      border-radius: var(--radius-md);
      background: white;
      font-family: 'Rubik', sans-serif;
      font-size: 0.95em;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .speed-option-btn.selected {
      border-color: #8B5CF6;
      background: #F3E8FF;
    }

    .start-speed-btn {
      background: linear-gradient(135deg, #8B5CF6, #6D28D9);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      padding: 16px 40px;
      font-family: 'Rubik', sans-serif;
      font-size: 1.15em;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 4px 15px rgba(139,92,246,0.3);
      transition: transform 0.15s;
    }
    .start-speed-btn:hover { transform: scale(1.03); }
    .start-speed-btn:disabled { background: #ccc; box-shadow: none; cursor: default; }

    .speed-timer-bar {
      background: #eee;
      height: 10px;
      border-radius: 5px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .speed-timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #8B5CF6, #6D28D9);
      border-radius: 5px;
      transition: width 0.3s linear;
    }

    .speed-stats-row {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
      font-size: 0.9em;
      color: var(--color-text-light);
    }
    .speed-stats-row .val {
      font-size: 1.3em;
      font-weight: 700;
      color: var(--color-text);
      display: block;
    }

    .speed-question-display {
      font-size: 2.4em;
      font-weight: 700;
      color: var(--color-text);
      margin: 24px 0;
      direction: ltr;
      letter-spacing: 2px;
    }

    .speed-input {
      width: 160px;
      padding: 14px;
      border: 3px solid #e0e0e0;
      border-radius: var(--radius-lg);
      font-family: 'Rubik', sans-serif;
      font-size: 2em;
      text-align: center;
      outline: none;
      direction: ltr;
      transition: border-color 0.15s;
    }
    .speed-input:focus { border-color: #8B5CF6; }
    .speed-input.flash-correct { border-color: var(--color-success); background: var(--color-success-bg); }
    .speed-input.flash-wrong { border-color: var(--color-error); background: var(--color-error-bg); }

    .speed-streak {
      margin-top: 12px;
      font-size: 0.95em;
      color: #8B5CF6;
      font-weight: 600;
      min-height: 24px;
    }

    .speed-result-big {
      font-size: 3em;
      font-weight: 700;
      color: #8B5CF6;
      margin: 10px 0;
    }
    .speed-result-details {
      display: flex;
      justify-content: space-around;
      background: white;
      border-radius: var(--radius-md);
      padding: 16px;
      margin: 16px 0;
      box-shadow: var(--shadow-sm);
    }
    .speed-result-details .item { text-align: center; }
    .speed-result-details .label { font-size: 0.8em; color: var(--color-text-light); }
    .speed-result-details .value { font-size: 1.4em; font-weight: 700; }

    .speed-mistakes-list {
      background: white;
      border-radius: var(--radius-md);
      padding: 16px;
      margin: 16px 0;
      text-align: right;
      box-shadow: var(--shadow-sm);
    }
    .speed-mistakes-list h3 { font-size: 0.9em; color: var(--color-error); margin-bottom: 10px; }
    .mistake-item {
      padding: 6px 0;
      font-size: 0.9em;
      border-bottom: 1px solid #f0f0f0;
      direction: ltr;
      text-align: center;
    }
    .mistake-item:last-child { border-bottom: none; }

    .results-btn {
      background: #8B5CF6;
      color: white;
      border: none;
      border-radius: var(--radius-md);
      padding: 14px 32px;
      font-family: 'Rubik', sans-serif;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      margin: 8px;
      transition: transform 0.15s;
    }
    .results-btn:hover { transform: scale(1.02); }
    .results-btn.secondary {
      background: var(--color-bg);
      color: var(--color-primary);
      border: 2px solid var(--color-primary);
    }

    .section-label {
      color: var(--color-text-light);
      margin: 16px 0 8px;
      font-size: 0.9em;
    }

    @media (max-width: 400px) {
      .speed-question-display { font-size: 1.8em; }
      .speed-input { font-size: 1.6em; width: 140px; }
    }
  </style>
</head>
<body>

  <div class="speed-header" style="position:relative;">
    <a href="../index.html" class="speed-back" title="חזרה">חזרה ←</a>
    <h1>🏅 אלופי הכפל — חצי גמר וגמר</h1>
  </div>

  <div class="speed-container">

    <!-- SETUP PHASE -->
    <div id="speedSetup">
      <h2>בחרו סוגי תרגילים:</h2>
      <div class="category-grid" id="categoryGrid"></div>

      <p class="section-label">זמן:</p>
      <div class="speed-option-row">
        <button class="speed-option-btn" id="time30" onclick="setDrillTime(30)">30 שניות</button>
        <button class="speed-option-btn selected" id="time60" onclick="setDrillTime(60)">דקה</button>
        <button class="speed-option-btn" id="time120" onclick="setDrillTime(120)">2 דקות</button>
      </div>

      <button class="start-speed-btn" id="startSpeedBtn" onclick="startSpeedDrill()">יאללה, מתחילים! 🏅</button>
    </div>

    <!-- ACTIVE DRILL -->
    <div id="speedActive" style="display:none;">
      <div class="speed-timer-bar"><div class="speed-timer-fill" id="speedTimerFill"></div></div>
      <div class="speed-stats-row">
        <div><span class="val" id="speedTimeLeft">60</span>שניות</div>
        <div><span class="val" id="speedCorrectCount">0</span>נכונים</div>
        <div><span class="val" id="speedStreakCount">0</span>רצף 🔥</div>
      </div>
      <div class="speed-question-display" id="speedQuestion"></div>
      <input class="speed-input" type="tel" id="speedInput" autocomplete="off" inputmode="numeric">
      <div class="speed-streak" id="speedStreakMsg"></div>
    </div>

    <!-- RESULTS -->
    <div id="speedResults" style="display:none;">
      <h2>⏱️ סיום!</h2>
      <div class="speed-result-big" id="speedResultScore"></div>
      <p style="color:var(--color-text-light)">תשובות נכונות</p>
      <div class="speed-result-details">
        <div class="item"><div class="label">סה"כ שאלות</div><div class="value" id="speedResTotal"></div></div>
        <div class="item"><div class="label">אחוז הצלחה</div><div class="value" id="speedResAccuracy"></div></div>
        <div class="item"><div class="label">רצף מקסימלי</div><div class="value" id="speedResStreak"></div></div>
      </div>
      <div class="speed-mistakes-list" id="speedMistakesList" style="display:none">
        <h3>💡 כדאי לתרגל:</h3>
        <div id="speedMistakesContent"></div>
      </div>
      <button class="results-btn" onclick="resetDrill()">🔄 שוב!</button>
      <a class="results-btn secondary" href="../index.html" style="text-decoration:none;display:inline-block;">🏠 חזרה לתפריט</a>
    </div>

  </div>

  <script src="core.js"></script>
  <script>
    // ===== STATE =====
    const params = new URLSearchParams(window.location.search);
    const userName = decodeURIComponent(params.get('name') || '');
    const userGender = params.get('gender') || localStorage.getItem('math_app_gender') || 'female';

    const CATEGORIES = [
      { id: 'mul10',   label: '✖️ כפל ב-10/100/1000' },
      { id: 'div10',   label: '➗ חילוק ב-10/100/1000' },
      { id: 'tens',    label: '🔢 עשרות ומאות שלמות' },
      { id: 'order',   label: '📐 סדר פעולות' },
    ];

    let selectedCategories = new Set(['mul10', 'div10', 'tens']);
    let speedDrillTime = 60;
    let speedTimer = null;
    let speedTimeRemaining = 0;
    let speedCorrect = 0;
    let speedTotal = 0;
    let speedStreak = 0;
    let speedMaxStreak = 0;
    let speedMistakes = [];
    let speedCurrentAnswer = 0;
    let speedCurrentQuestion = '';

    const STREAK_MSGS = {
      female: { 5: '⚡ את על גל!', 10: '🔥 רצף מטורף!', 15: '🔥🔥 מדהים!', 20: '🔥🔥🔥 בלתי ניתנת לעצירה!' },
      male:   { 5: '⚡ אתה על גל!', 10: '🔥 רצף מטורף!', 15: '🔥🔥 מדהים!', 20: '🔥🔥🔥 בלתי ניתן לעצירה!' },
    };

    // ===== QUESTION GENERATORS =====

    function genMul10() {
      const multipliers = [10, 100, 1000];
      const m = randChoice(multipliers);
      const maxN = m === 1000 ? 999 : (m === 100 ? 9999 : 99999);
      const n = randInt(2, Math.min(maxN, 999));
      const answer = n * m;
      return { q: n + ' × ' + m.toLocaleString() + ' = ?', a: answer };
    }

    function genDiv10() {
      const divisors = [10, 100, 1000];
      const d = randChoice(divisors);
      const result = randInt(2, 999);
      const dividend = result * d;
      return { q: dividend.toLocaleString() + ' ÷ ' + d.toLocaleString() + ' = ?', a: result };
    }

    function genTens() {
      const tens = [20, 30, 40, 50, 60, 70, 80, 90];
      const hundreds = [100, 200, 300, 400, 500];
      const pool = [...tens, ...hundreds];
      const a = randChoice(pool);
      const b = randChoice(pool);
      const product = a * b;
      if (product > 1000000) return genTens();
      return { q: a + ' × ' + b + ' = ?', a: product };
    }

    function genOrder() {
      const templates = [
        function() { var a=randInt(2,9), b=randInt(2,9), c=randInt(1,20); return { q: a+' × '+b+' + '+c+' = ?', a: a*b+c }; },
        function() { var a=randInt(1,20), b=randInt(2,9), c=randInt(2,9); return { q: a+' + '+b+' × '+c+' = ?', a: a+b*c }; },
        function() { var a=randInt(2,10), b=randInt(2,10), c=randInt(2,9); return { q: '('+a+' + '+b+') × '+c+' = ?', a: (a+b)*c }; },
        function() { var a=randInt(2,9), b=randInt(2,9), c=randInt(1,a*b-1); return { q: a+' × '+b+' - '+c+' = ?', a: a*b-c }; },
      ];
      return randChoice(templates)();
    }

    const GENERATORS = {
      mul10: genMul10,
      div10: genDiv10,
      tens: genTens,
      order: genOrder,
    };

    // ===== SETUP =====
    function initSetup() {
      document.getElementById('speedSetup').style.display = 'block';
      document.getElementById('speedActive').style.display = 'none';
      document.getElementById('speedResults').style.display = 'none';

      const grid = document.getElementById('categoryGrid');
      grid.innerHTML = '';
      CATEGORIES.forEach(function(cat) {
        var b = document.createElement('button');
        b.className = 'cat-select-btn' + (selectedCategories.has(cat.id) ? ' selected' : '');
        b.textContent = cat.label;
        b.onclick = function() {
          if (selectedCategories.has(cat.id)) selectedCategories.delete(cat.id);
          else selectedCategories.add(cat.id);
          b.classList.toggle('selected');
          updateStartBtn();
        };
        grid.appendChild(b);
      });
      updateStartBtn();
    }

    function setDrillTime(t) {
      speedDrillTime = t;
      ['time30', 'time60', 'time120'].forEach(function(id) { document.getElementById(id).classList.remove('selected'); });
      document.getElementById('time' + t).classList.add('selected');
    }

    function updateStartBtn() {
      document.getElementById('startSpeedBtn').disabled = selectedCategories.size === 0;
    }

    // ===== DRILL =====
    function startSpeedDrill() {
      if (selectedCategories.size === 0) return;
      document.getElementById('speedSetup').style.display = 'none';
      document.getElementById('speedActive').style.display = 'block';
      document.getElementById('speedResults').style.display = 'none';

      speedCorrect = 0; speedTotal = 0; speedStreak = 0; speedMaxStreak = 0; speedMistakes = [];
      speedTimeRemaining = speedDrillTime;

      document.getElementById('speedCorrectCount').textContent = '0';
      document.getElementById('speedStreakCount').textContent = '0';
      document.getElementById('speedStreakMsg').textContent = '';
      document.getElementById('speedTimerFill').style.background = 'linear-gradient(90deg, #8B5CF6, #6D28D9)';

      genQuestion();
      var inp = document.getElementById('speedInput');
      inp.value = '';
      inp.focus();
      inp.oninput = onInput;

      updateTimer();
      speedTimer = setInterval(function() {
        speedTimeRemaining--;
        updateTimer();
        if (speedTimeRemaining <= 0) endDrill();
      }, 1000);
    }

    function updateTimer() {
      document.getElementById('speedTimeLeft').textContent = speedTimeRemaining;
      document.getElementById('speedTimerFill').style.width = (speedTimeRemaining / speedDrillTime * 100) + '%';
      if (speedTimeRemaining <= 10) {
        document.getElementById('speedTimerFill').style.background = 'linear-gradient(90deg, var(--color-error), #E74C3C)';
      }
    }

    function genQuestion() {
      var cats = Array.from(selectedCategories);
      var cat = randChoice(cats);
      var gen = GENERATORS[cat]();
      speedCurrentQuestion = gen.q;
      speedCurrentAnswer = gen.a;
      document.getElementById('speedQuestion').textContent = gen.q;
    }

    function onInput() {
      var inp = document.getElementById('speedInput');
      var val = inp.value.replace(/,/g, '').trim();
      if (!val) return;
      var num = parseInt(val);
      if (isNaN(num)) return;

      if (val.length >= String(speedCurrentAnswer).length) {
        speedTotal++;
        var ok = num === speedCurrentAnswer;
        if (ok) {
          speedCorrect++;
          speedStreak++;
          if (speedStreak > speedMaxStreak) speedMaxStreak = speedStreak;
          inp.classList.add('flash-correct');
          document.getElementById('speedCorrectCount').textContent = speedCorrect;
          document.getElementById('speedStreakCount').textContent = speedStreak;

          var msgs = STREAK_MSGS[userGender] || STREAK_MSGS.female;
          var sm = document.getElementById('speedStreakMsg');
          if (speedStreak >= 20) sm.textContent = msgs[20];
          else if (speedStreak >= 15) sm.textContent = msgs[15];
          else if (speedStreak >= 10) sm.textContent = msgs[10];
          else if (speedStreak >= 5) sm.textContent = msgs[5];
          else sm.textContent = '';
        } else {
          speedStreak = 0;
          inp.classList.add('flash-wrong');
          document.getElementById('speedStreakCount').textContent = '0';
          document.getElementById('speedStreakMsg').textContent = '';
          speedMistakes.push(speedCurrentQuestion.replace('?', speedCurrentAnswer.toLocaleString()));
        }

        setTimeout(function() {
          inp.classList.remove('flash-correct', 'flash-wrong');
          inp.value = '';
          genQuestion();
        }, 200);
      }
    }

    function endDrill() {
      clearInterval(speedTimer);
      speedTimer = null;
      document.getElementById('speedInput').oninput = null;
      document.getElementById('speedActive').style.display = 'none';
      document.getElementById('speedResults').style.display = 'block';

      document.getElementById('speedResultScore').textContent = speedCorrect;
      document.getElementById('speedResTotal').textContent = speedTotal;
      document.getElementById('speedResAccuracy').textContent =
        speedTotal > 0 ? Math.round(speedCorrect / speedTotal * 100) + '%' : '-';
      document.getElementById('speedResStreak').textContent = speedMaxStreak;

      if (speedMistakes.length > 0) {
        document.getElementById('speedMistakesList').style.display = 'block';
        document.getElementById('speedMistakesContent').innerHTML =
          speedMistakes.slice(0, 10).map(function(m) { return '<div class="mistake-item">' + m + '</div>'; }).join('');
      } else {
        document.getElementById('speedMistakesList').style.display = 'none';
      }

      if (speedCorrect >= 15 || (speedTotal > 0 && speedCorrect / speedTotal >= 0.9)) {
        launchConfetti(60);
      }
    }

    function resetDrill() {
      initSetup();
    }

    // ===== INIT =====
    initSetup();
  </script>
</body>
</html>
